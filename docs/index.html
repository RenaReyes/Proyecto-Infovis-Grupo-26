    const genreMessages = {"Pop": "El <b>Pop</b> domina las listas de streaming globales con ritmos pegadizos.", "Rock": "El <b>Rock</b> mantiene una base de oyentes leales con un consumo estable.", "Hip Hop": "El <b>Hip Hop</b> ha mostrado un crecimiento masivo desde 2018.", "Classical": "Informaci\u00f3n detallada para el g\u00e9nero <b>Classical</b>.", "Country": "Informaci\u00f3n detallada para el g\u00e9nero <b>Country</b>.", "EDM": "Informaci\u00f3n detallada para el g\u00e9nero <b>EDM</b>.", "Folk": "Informaci\u00f3n detallada para el g\u00e9nero <b>Folk</b>.", "Hip-Hop": "Informaci\u00f3n detallada para el g\u00e9nero <b>Hip-Hop</b>.", "Indie": "Informaci\u00f3n detallada para el g\u00e9nero <b>Indie</b>.", "Jazz": "Informaci\u00f3n detallada para el g\u00e9nero <b>Jazz</b>.", "Metal": "Informaci\u00f3n detallada para el g\u00e9nero <b>Metal</b>.", "R&B": "Informaci\u00f3n detallada para el g\u00e9nero <b>R&B</b>.", "Reggaeton": "Informaci\u00f3n detallada para el g\u00e9nero <b>Reggaeton</b>."};
    const baseColor = '#b0c4de';
    const highlightColor = '#1e90ff';

    const colorMap = {
      "Hip-Hop": "#E29C05",
      "R&B": "#B61B82",
      "Rock": "#5E6CEC"
    };

    function getGenreColor(genre) {
      return colorMap[genre] || baseColor;
    }

    const genreSounds = {
      "Classical": "./Sonidos/CLASSICAL.mp3",
      "Country": "./Sonidos/COUNTRY.mp3",
      "EDM": "./Sonidos/EDM.mp3",
      "Folk": "./Sonidos/FOLK.mp3",
      "Hip-Hop": "./Sonidos/HIP-HOP.mp3",
      "Indie": "./Sonidos/INDIE.mp3",
      "Jazz": "./Sonidos/JAZZ.mp3",
      "Metal": "./Sonidos/METAL.mp3",
      "Pop": "./Sonidos/POP.mp3",
      "R&B": "./Sonidos/R&B.mp3",
      "Reggaeton": "./Sonidos/REGGAETON.mp3",
      "Rock": "./Sonidos/ROCK.mp3"
    };

    let currentAudio = null;
    let audioEnabled = false;

    const plotDiv = document.getElementById('plot');
    const infoBox = document.getElementById('info-box');
    const genreName = document.getElementById('genre-name');
    const genreInfo = document.getElementById('genre-info');

    let currentHoveredGenre = null;

    document.body.addEventListener('click', function() {
      if (!audioEnabled) {
        audioEnabled = true;
        console.log('Audio enabled by click. Ahora pasa el cursor sobre un género para escuchar sonido.');
      }
    });

    function playGenreSound(genre) {
      if (!audioEnabled) {
        console.warn('Audio bloqueado hasta realizar un clic. Haz clic en el gráfico para habilitar sonido.');
        return;
      }

      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      if (genreSounds[genre]) {
        currentAudio = new Audio(genreSounds[genre]);
        currentAudio.volume = 0.5;
        currentAudio.play().catch(function(error) {
          console.warn('Error al reproducir audio:', error);
        });
      }
    }

    function highlightGenre(genre) {
      if (currentHoveredGenre === genre) return;

      currentHoveredGenre = genre;
      playGenreSound(genre);

      genreName.textContent = genre;
      genreInfo.innerHTML = genreMessages[genre];
      infoBox.style.display = 'block';

      fig.data.forEach(t => {
        if (t.legendgroup === genre) {
          t.opacity = 1;
          if (t.mode === 'lines') { t.line.color = getGenreColor(t.legendgroup);; t.line.width = 4; }
          if (t.mode === 'markers') t.marker.color = getGenreColor(t.legendgroup);
          if (t.mode === 'text') t.textfont.color = highlightColor;
        } else {
          t.opacity = 0.1;
          if (t.mode === 'lines') { t.line.color = getGenreColor(t.legendgroup); t.line.width = 3; }
          if (t.mode === 'markers') t.marker.color = getGenreColor(t.legendgroup);
          if (t.mode === 'text') t.textfont.color = baseColor;
        }
      });

      Plotly.react(plotDiv, fig.data, fig.layout);
    }

    function resetVisualization() {
      currentHoveredGenre = null;

      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      infoBox.style.display = 'none';

      fig.data.forEach(t => {
        t.opacity = 1;
        if (t.mode === 'lines') { t.line.color = getGenreColor(t.legendgroup); t.line.width = 3; }
        if (t.mode === 'markers') t.marker.color = getGenreColor(t.legendgroup);
        if (t.mode === 'text') t.textfont.color = getGenreColor(t.legendgroup);
      });

      Plotly.react(plotDiv, fig.data, fig.layout);
    }

    Plotly.newPlot(plotDiv, fig.data, fig.layout, { responsive: true, displayModeBar: false });

    plotDiv.on('plotly_hover', function(data) {
      if (data.points.length > 0) {
        const hoveredGenre = fig.data[data.points[0].curveNumber].legendgroup;
        highlightGenre(hoveredGenre);
      }
    });

    plotDiv.on('plotly_unhover', function() {
      resetVisualization();
    });
  </script>
